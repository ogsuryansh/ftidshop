    <style>
        .sticky_buttons {
            position: fixed;
            width: 64px;
            right: 10px;
            bottom: 100px;
            z-index: 100;
        }
        .sticky_buttons>a {
            margin-top: 10px;
            display: inline-block;
        }
        .sticky_buttons img {
            width: 60px;
            height: 60px;
            border-radius: 100%;
        }

        /* Responsive Overrides */
        @media (max-width: 768px) {
            header .flex_container {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center !important;
                gap: 15px;
            }
            .welcomeblock { 
                display: flex !important; 
                justify-content: center !important; 
                width: 100% !important; 
                gap: 10px;
            }
            .welcomeblock .button { margin: 0 !important; }
            .hero .flex_container { flex-direction: column !important; text-align: center !important; }
            [data-width="50%"] { width: 100% !important; margin-bottom: 20px; }
            .hero_image { max-width: 100%; height: auto; }
            .flex_rows_3, .flex_rows_4 { 
                width: 100% !important; 
                flex: 0 0 100% !important; 
                margin-left: 0 !important; 
                margin-right: 0 !important; 
                margin-bottom: 20px !important;
            }
            .sticky_buttons { bottom: 20px !important; right: 10px !important; }
            .sticky_buttons img { width: 45px !important; height: 45px !important; }
            .navigation { display: none !important; }
            .text_4xlarge { font-size: 2rem !important; }
            .text_2xlarge { font-size: 1.5rem !important; }
            .pt_12, .pb_12 { padding-top: 3rem !important; padding-bottom: 3rem !important; }
        }
    </style>
